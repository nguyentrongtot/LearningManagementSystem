version: '3.8'

services:
  # Cấu hình SQL Server cho Lab
  lms-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: lms-sql-server
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Password123
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    # Healthcheck: kiểm tra SQL Server đã sẵn sàng nhận kết nối chưa
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Password123' -Q 'SELECT 1' -No -C || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Cấu hình Web API
  lms-api:
    image: lms-api-service
    container_name: lms-api-container
    build:
      context: .                            # Đứng từ thư mục LearningManagementSystem (chứa solution)
      dockerfile: PRN232.LMS.API/Dockerfile # Đường dẫn tới Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=lms-db,1433;Database=LMS_PRN232;User Id=sa;Password=YourStrong@Password123;TrustServerCertificate=True;MultipleActiveResultSets=True;
    depends_on:
      lms-db:
        condition: service_healthy          # Chờ đến khi DB healthcheck pass mới start API

volumes:
  mssql-data: